<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS 로그인</title>
  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      display: block;
      margin: 10px 0;
      padding: 12px 20px;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
    }
    .google { background-color: #4285F4; }
    .naver { background-color: #03C75A; }
    .kakao { background-color: #FEE500; color: #000; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/javascript">
    const LoginPage = () => (
      React.createElement('div', { className: 'container' }, [
        React.createElement('h1', { key: 'title' }, 'SNS 간편 로그인'),
        React.createElement('a', {
          key: 'google',
          className: 'btn google',
          href: 'https://accounts.google.com/o/oauth2/v2/auth'
        }, 'Google로 로그인'),
        React.createElement('a', {
          key: 'naver',
          className: 'btn naver',
          href: 'https://nid.naver.com/oauth2.0/authorize'
        }, '네이버로 로그인'),
        React.createElement('a', {
          key: 'kakao',
          className: 'btn kakao',
          href: 'https://kauth.kakao.com/oauth/authorize'
        }, '카카오로 로그인')
      ])
    );
    ReactDOM.render(React.createElement(LoginPage), document.getElementById('root'));
  </script>
</body>
</html>
